{% load static %}
<article class="movie-card">
  <a class="a-block" href="{% url 'movies:detail' movie.pk %}">
    {% if movie.path %}
    <img
      class="movie-card-cover"
      src="{% static 'movies/images/' %}{{ movie.path }}"
      alt="{{ movie.name }}"
    />
    {% else %}
    <img
      class="movie-card-cover"
      src="{% static 'movies/images/nocover.png' %}"
      alt="{{ movie.name }}"
    />
    {% endif %}

    <div class="movie-info">
      <h2>{{ movie.name }}</h2>
      <p>{{ movie.year }}</p>
      {% if movie.rate %}
      <p>Rate: {{ movie.rate }}</p>
      {% if movie.rate >= 8 %}
      <p>РЕКОМЕНДУЕМ!</p>
      {% endif %} {% else %}
      <p>Еще не оценен</p>
      {% endif %}
      <div class="movie-description">
        <p>{{ movie.description|truncatewords:15|linebreaksbr }}</p>
      </div>
    </div>
  </a>
</article>
