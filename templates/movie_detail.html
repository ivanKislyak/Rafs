{% extends 'base.html' %}

{% block title %}Рецензия на фильм{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Интерстеллар</h5>
                <p class="text-muted">Жанр: Фантастика</p>
                <p>Классное кино про космос и время.</p>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3">Оставить рецензию</h4>
            <form>
                <div class="mb-3">
                    <label class="form-label">Ваша оценка</label>
                    <select class="form-select">
                        <option>10 из 10</option>
                        <option>9 из 10</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Текст рецензии</label>
                    <textarea class="form-rows-4 form-control" placeholder="Напишите, что думаете..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Опубликовать</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
